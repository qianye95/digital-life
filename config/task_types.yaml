# 待办类型 → Skill 映射
#
# 模型拿到一个待办后，系统按 todo 的 type 字段查这张表，
# 拉对应 Skill 的 SKILL.md 内容注入 prompt。
# Skill 文件位置：interfaces/skills/<skill_name>/SKILL.md
#
# type 留空 = 通用待办，注入 todo_execution（通用执行方法论）。

task_types:
  default:
    skill: todo_execution
    description: 通用待办执行方法论。type 为空时的兜底。
    applies_to: 所有实例

  project_management:
    skill: project_management
    description: 项目管理。规划、分派、评审、日常推进。
    applies_to: 承担项目管理任务的规划者

  project_bootstrap:
    skill: project_bootstrap
    description: 项目分工与方法论。用在项目刚启动的分工阶段。
    applies_to: 项目负责人

  research:
    skill: todo_execution
    description: 调研类任务（技术 / 市场 / 用户研究）。
    applies_to: 任何做调研的执行者
    note: 暂用 todo_execution 通用方法论，待 research_workflow 成熟

  development:
    skill: todo_execution
    description: 开发类任务（写代码 / 跑测试 / debug）。
    applies_to: 任何写代码的执行者
    note: 暂用 todo_execution 通用方法论，待 development_workflow 成熟

  reflection:
    skill: self_review
    description: 反思类任务（自我审视、教训沉淀）。
    applies_to: 任何反思的员工

  trading:
    skill: todo_execution
    description: 交易类任务（策略执行、仓位调整、复盘）。
    applies_to: 交易员
    note: 暂用 todo_execution 通用方法论，待 trading_workflow 成熟

  communication:
    skill: todo_execution
    description: 沟通类任务（回复消息、汇报、协调）。
    applies_to: 任何做沟通的实例
    note: 暂用 todo_execution 通用方法论
