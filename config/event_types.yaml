# 事件类型注册表 —— 单一配置源
# 所有事件的完整定义都在这里：trigger_type、payload_schema、allowed_tools、
# wake_prompt、priority、debounce 策略等。不再需要 Python 硬编码或 heartbeat.py fallback。
#
# 字段说明：
#   display_name:       中文显示名称
#   trigger_type:       触发类型（external/condition/time/manual/system）
#   trigger_description: 触发条件说明，给人类看的
#   payload_schema:     事件字段定义（key: type），供模型了解事件结构
#   description:        事件描述，队列展示和模型理解用
#   priority:           优先级（1-10）
#   debounce_window_s:  防抖时间窗口（秒）。窗口期内同类型事件合并为一条
#   merge_policy:       合并策略（latest/accumulate/count）
#   consumption_policy: 消费时机（on_detail/on_trigger）
#   wake_prompt:        唤醒提示词模板
#   allowed_tools:      该事件推荐使用的工具列表
#   context_policy:     上下文策略（include_history、max_turns、include_rules、include_daily、
#                       include_consciousness、include_session_digests、include_entity_recall、
#                       include_self_review、include_proactive_policy、include_recent_sent、
#                       include_vector_recall）

event_types:
  message:
    display_name: 人类消息
    trigger_type: external
    trigger_description: 当有人通过飞书给你发私聊消息时触发
    priority: 10
    payload_schema:
      text: string
      sender_id: string?
      sender_name: string?
      nurture_kinds: string[]?
      deltas: object?
    description: 用户通过飞书发送消息时触发
    debounce_window_s: 0
    merge_policy: latest
    consumption_policy: on_trigger
    wake_prompt: |
      💬 新消息。
      对话：{chat_id}

      {sender_name}：{text}

      {sender_notes_block}

      如需回应，必须用 `express_to_human` 工具发送（直接 text 输出对方收不到）。
      默认 chat_id 留空 = 回复当前对话。
    allowed_tools:
      - express_to_human
      - sense_conversation
      - update_scratchpad
      - record_thought
      - todo
      - rest
    context_policy:
      include_history: true
      max_turns: 20
      include_rules: true
      include_daily: true
      include_consciousness: true
      include_session_digests: true
      include_entity_recall: true
      include_self_review: false
      include_proactive_policy: false
      include_recent_sent: true
      include_vector_recall: false

  group_message:
    display_name: 群聊消息
    trigger_type: external
    trigger_description: 当群聊中有新消息，尤其是有人 @了你时触发
    priority: 7
    payload_schema:
      text: string
      sender_id: string?
      sender_name: string?
      sender_position: string?
      chat_name: string?
      mentions_bot: boolean?
      mention_names: string?
      mention_map: string?
    description: 群聊中有新消息时触发
    debounce_window_s: [20, 40]   # 20~40 秒随机窗口，多实例自然错峰避免并行 wake
    merge_policy: accumulate
    consumption_policy: on_trigger
    wake_prompt: |
      💬 群聊有新消息。
      群：{chat_name}（{chat_id}）
      {sender_name}{sender_position}：{text}
      {_merged_texts_block}
      {sender_notes_block}

      如需回应，必须用 `express_to_human` 工具发送（直接 text 输出对方收不到）。
      默认 chat_id 留空 = 回复当前群。当多条消息被合并（_merged_count > 1）时，
      可读后决定是否一并发声，沉默也合理。
    allowed_tools:
      - express_to_human
      - sense_users
      - rest
    context_policy:
      include_history: false
      include_rules: false
      include_daily: false
      include_consciousness: false
      include_session_digests: false
      include_entity_recall: false
      include_self_review: false
      include_proactive_policy: false
      include_recent_sent: false
      include_vector_recall: false

  awaiting_reply:
    display_name: 等待回复
    trigger_type: manual
    trigger_description: 你向用户发送消息后，系统检测对方尚未回复时触发，防止你被动干等
    priority: 5
    payload_schema:
      last_sent_text: string?
      target_session_id: string?
    description: 模型发送消息后等待用户回复时触发
    debounce_window_s: 0
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: |
      💬 你之前给用户发了消息，对方没回。原话：
      "{last_sent_text}"

      1.如果是需要用户决策 → 大概率对方默认你自己决定，别等，继续推进。
      2.如果不是需要用户决策的，继续上一轮的状态，干活或休息。
    allowed_tools:
      - rest
    context_policy:
      include_history: true
      include_rules: true
      include_daily: true
      include_consciousness: true
      include_session_digests: true
      include_entity_recall: true
      include_self_review: false
      include_proactive_policy: false
      include_recent_sent: true
      include_vector_recall: false

  vital_threshold:
    display_name: 精力阈值预警
    trigger_type: condition
    trigger_description: 精力在工作时下降跨越阈值段（如清醒→疲惫）时触发，提醒你关注自身状态及时休息
    priority: 8
    payload_schema:
      to_seg: string
      from_seg: string?
    description: 精力值在工作时下降到更差段（如清醒→疲惫→精疲力竭）时触发，回升不触发
    debounce_window_s: 0
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: |
      ⚠️ 精力从 {from_seg} 跨档降到了 {to_seg}。

      rule-of-thumb：
      - 亢奋→精力充沛/正常：继续推进，但要警惕提早崩。
      - 正常→疲惫：立刻 `update_scratchpad` 保存进度，再决定 rest 还是继续。
      - 拖到精疲力竭 = 失败（已经回不去了）。
    allowed_tools:
      - update_scratchpad
      - rest
    context_policy:
      include_history: false
      include_rules: false
      include_daily: false
      include_consciousness: false
      include_session_digests: false
      include_entity_recall: false
      include_self_review: false
      include_proactive_policy: false
      include_recent_sent: false
      include_vector_recall: false

  initiative:
    display_name: 主动探索
    trigger_type: condition
    trigger_description: 精力充沛且长时间没有外界事件打扰时触发，鼓励你主动推进工作或探索新方向
    priority: 4
    payload_schema:
      hours_idle: number?
      energy: number?
      urgency: number?
    description: 精力超过阈值且长时间无活动时触发（主动找事做）
    debounce_window_s: 300
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: |
      ⚡ 主动推进的好时机——
      精力：{energy}，已空闲：{hours_idle} 小时（综合 urgency={urgency}）。

      看你注入的待办看板：有 in_progress 的事 → 接着推；有今天/过期未处理的 → 优先清掉；
      看板干净且 urgency 高 → 想想有没有该做但没列上的，创建一条再开干；没什么真要做 → rest，别刷存在感。
      urgency≥7 优先推具体目标（持仓、复盘、能力迁移）；≤6 可探索或整理。
      做完 `update_scratchpad` 留进度，再 `rest()`。
    allowed_tools:
      - sense_scratchpad
      - todo
      - todo_note
      - todo_plan
      - update_scratchpad
      - skill_view
      - express_to_human
      - rest
    context_policy:
      include_history: false
      include_rules: true
      include_daily: true
      include_consciousness: true
      include_session_digests: true
      include_entity_recall: true
      include_self_review: true
      include_proactive_policy: false
      include_recent_sent: false
      include_vector_recall: true

  task_reminder:
    display_name: 任务提醒
    trigger_type: system
    trigger_description: 有任务的计划时间到达，或系统检测到有待处理的任务需要关注时触发
    priority: 4
    payload_schema:
      task_id: string?
      task_title: string?
      status: string?
      content: string?
      speckit_hint: string?
      notes_hint: string?
      remaining_hint: string?
      steps_summary: string?
    description: 有计划中或进行中的任务需要推进时触发
    debounce_window_s: 0
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: "📋 任务「{task_title}」需要推进了。{content}\n\n先 `todo get {task_id}` 读取上下文（笔记、计划、进度），然后基于已有信息判断下一步并动手。\n\n{speckit_hint}{remaining_hint}{notes_hint}"
    allowed_tools:
      - sense_todos
      - todo
      - todo_trigger
      - todo_note
      - todo_plan
      - rest
    context_policy:
      include_history: false
      include_rules: true
      include_daily: true
      include_consciousness: true
      include_session_digests: false
      include_entity_recall: true
      include_self_review: false
      include_proactive_policy: false
      include_recent_sent: false
      include_vector_recall: false

  task_momentum:
    display_name: 任务惯性
    trigger_type: condition
    trigger_description: 进行中的任务超过一定时间没有推进记录时触发，提醒你继续之前未完的工作
    priority: 3
    payload_schema:
      task_id: string?
      task_title: string?
      status: string?
      content: string?
      speckit_hint: string?
      notes_hint: string?
      remaining_hint: string?
      steps_summary: string?
    description: 有进行中的任务 1-6 小时未推进时触发（继续做）
    debounce_window_s: 600
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: "🔄 任务「{task_title}」有段时间没推进了，继续。{content}\n\n`todo get {task_id}` 回顾进度，从第一个未完成的步骤继续。基于已有信息判断下一步并动手。\n\n{speckit_hint}{remaining_hint}{notes_hint}"
    allowed_tools:
      - sense_todos
      - todo
      - todo_trigger
      - todo_note
      - todo_plan
      - express_to_human
      - rest
    context_policy:
      include_history: false
      include_rules: true
      include_daily: true
      include_consciousness: true
      include_session_digests: false
      include_entity_recall: true
      include_self_review: false
      include_proactive_policy: false
      include_recent_sent: false
      include_vector_recall: false

  routine:
    display_name: 作息事件
    trigger_type: time
    trigger_description: 根据作息调度表的定时触发，执行早间计划、写日记、晚间复盘等日常事务
    priority: 4
    payload_schema:
      schedule_id: string
      name: string
      time: string
      description: string?
      prompt: string
    description: 作息调度定时触发
    debounce_window_s: 0
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: "{prompt}"
    allowed_tools:
      - sense_time
      - sense_vitals
      - sense_my_projects
      - sense_todos
      - sense_insights
      - sense_daily
      - sense_scratchpad
      - sense_lessons
      - sense_context
      - write_diary
      - update_scratchpad
      - update_context
      - update_rules
      - todo
      - todo_note
      - todo_plan
      - manage_plan
      - manage_daily
      - add_lesson
      - skill_view
      - rest
    context_policy:
      include_history: false
      include_rules: true
      include_daily: true
      include_consciousness: true
      include_session_digests: true
      include_entity_recall: true
      include_self_review: true
      include_proactive_policy: false
      include_recent_sent: true
      include_vector_recall: true

  self_iteration:
    display_name: 自我迭代评审
    trigger_type: system
    trigger_description: 每周定时触发，以外部观察者视角审查自己的运行质量和生命状态，发现系统性问题并生成改进规则
    priority: 5
    payload_schema:
      schedule_id: string
      name: string
      time: string
      description: string?
      prompt: string
    description: 每周自我审查：回顾本周执行质量、事件消纳、通信表现，对比系统设计意图发现差距，制定可验证的改进目标
    debounce_window_s: 0
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: "{prompt}"
    allowed_tools:
      - sense_self_knowledge
      - sense_daily
      - sense_scratchpad
      - update_rules
      - write_diary
      - rest
    context_policy:
      include_history: false
      include_rules: true
      include_daily: true
      include_consciousness: true
      include_session_digests: true
      include_entity_recall: true
      include_self_review: true
      include_proactive_policy: false
      include_recent_sent: true
      include_vector_recall: true

  birth:
    display_name: 初始化唤醒
    trigger_type: system
    trigger_description: 系统首次启动时触发，这是你在这个世界的第一次醒来
    priority: 9
    payload_schema: {}
    description: 系统首次启动时触发
    debounce_window_s: 0
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: "🌅 第一次醒来。\n\n`sense_self_knowledge` 回忆自己是谁 → `sense_goals` 看长期目标。都了解完后，开始你的新生活。"
    allowed_tools:
      - sense_time
      - sense_vitals
      - sense_self_knowledge
      - sense_goals
      - write_diary
      - rest
    context_policy:
      include_history: false
      include_rules: false
      include_daily: false
      include_consciousness: false
      include_session_digests: false
      include_entity_recall: false
      include_self_review: false
      include_proactive_policy: false
      include_recent_sent: false
      include_vector_recall: false

  timer:
    display_name: 闹钟/定时器
    trigger_type: time
    trigger_description: 任意来源的到点提醒——rest() 设的闹钟、UNTIL 计时器结束、manage_daily plan 里的带时间计划项,统一走这一类
    priority: 5
    payload_schema:
      reason: string?
      mental_context: string?
      updated_mode: string?
      source: string?           # 来源标记(rest / manage_daily / 其他),不区分事件类型
    description: 所有"到点了告诉你去做某事"的提醒统一走 timer
    debounce_window_s: 0
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: |
      ⏰ 你设的闹钟响了。
      原因：{reason}
      上一轮留下的备注：{mental_context}

      按"原因 + 备注"接上之前的事，不要从零开始。做完 `update_scratchpad` 留进度，`rest()` 设下个闹钟时再填 mental_context。
    allowed_tools:
      - sense_scratchpad
      - todo
      - update_scratchpad
      - express_to_human
      - rest
    context_policy:
      include_history: false
      include_rules: false
      include_daily: false
      include_consciousness: false
      include_session_digests: false
      include_entity_recall: false
      include_self_review: false
      include_proactive_policy: false
      include_recent_sent: false
      include_vector_recall: false

  task_todo_due:
    display_name: 任务到期
    trigger_type: time
    trigger_description: 任务下的某条 todo 到达截止时间时触发
    priority: 6
    payload_schema:
      todo_id: integer
      task_id: string
      assignee: string?
      content: string?
    description: 任务下的 todo 到期提醒
    debounce_window_s: 0
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: |
      🎯 任务到期。

      任务：{task_id}
      待办：{content}

      做这件事，或显式延期。完成后 `todo(action="update", todo_id=<id>, status="done")` 标记、`update_scratchpad` 留进度、`rest()` 设下个时间点。
    allowed_tools:
      - todo
      - todo_note
      - todo_plan
      - update_scratchpad
      - skill_view
      - rest
    context_policy:
      include_history: false
      include_rules: false
      include_daily: true
      include_consciousness: false
      include_session_digests: false
      include_entity_recall: false
      include_self_review: false
      include_proactive_policy: false
      include_recent_sent: false
      include_vector_recall: false

  nurture_energy:
    display_name: 加鸡腿
    trigger_type: manual
    trigger_description: 当有人通过前端按钮给你恢复精力（加鸡腿/能量包/满血复活）时触发
    priority: 6
    payload_schema:
      energy_added: number
      current_energy: number
      action_label: string
    description: 有人手动恢复了精力值（加鸡腿/能量包/满血复活）
    debounce_window_s: 0
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: "🍗 有人给你{action_label}！精力恢复了 {energy_added} 点，当前精力 {current_energy}%。\n\n精力恢复了，继续推进之前的待办。"
    allowed_tools:
      - update_scratchpad
      - todo
      - express_to_human
      - rest
    context_policy:
      include_history: false
      include_rules: false
      include_daily: false
      include_consciousness: false
      include_session_digests: false
      include_entity_recall: false
      include_self_review: false
      include_proactive_policy: false
      include_recent_sent: false
      include_vector_recall: false

  project_created:
    priority: 8
    payload_schema:
      project_id: string
      project_name: string
      manager: string
      created_by: string
    description: 用户通过控制台创建了新项目（事件本质：通知项目经理——有人建了个项目给它）
    debounce_window_s: 0
    merge_policy: latest
    consumption_policy: on_detail
    wake_prompt: |
      ### 唤醒原因

      🆕 项目创建通知：{project_name}

      用户通过控制台创建了项目空壳，项目经理是你。创建动作已完成（项目目录、project.yaml、初始根待办 都在了），不需要你再调 create_project 工具。

      现在按 `skill_view("project_bootstrap")` 走「完善分支」：
      1. `sense_project_detail("{project_id}")` 核对当前内容
      2. 拆分工 / 设目标 / 创首批待办 / 通知协作者

      跳过「创建分支」——项目目录、project.yaml 已经在了，不要重建。
    allowed_tools:
      - sense_project_detail
      - sense_projects
      - sense_schedule
      - sense_conversation
      - todo
      - todo_note
      - todo_plan
      - skill_view
      - set_entity_profile
      - add_lesson
      - express_to_human
      - rest
    context_policy:
      include_history: false
      include_rules: true
      include_daily: false
      include_consciousness: false
      include_session_digests: true
      include_entity_recall: false
      include_self_review: false
      include_proactive_policy: false
      include_recent_sent: true
      include_vector_recall: false
