routines:
- description: 晨间规划：理解昨天、筛选真正重要的事、带着策略开始今天
  enabled: true
  id: morning_plan
  name: 早起计划
  priority: 5
  prompt_template: |
    🌅 早上好。拿出一个小时认真规划今天。

    调用 `skill_view daily_planner` 按完整方法论走：回顾昨天 → 审视信息缺口 → 逐项目独立深想（含正反两面） → 横向整合 → 落地今日 todos + update_context。
  recurrence: daily
  time: 08:00
- description: 午后诊断：用5 Whys追问根因，对照常见失败模式，做出明确的下午决策
  enabled: true
  id: afternoon_checkin
  name: 午后检查
  priority: 4
  prompt_template: |
    ☀ 午后诊断，不是进度汇报。诚实面对自己。

    `sense_daily` + `sense_vitals` + `sense_rules`（检查有没有违反行为规则？）。

    ## 量化上午
    上午完成了几个目标？没完成的比例是多少？

    ## 深度诊断（5 Whys）
    对每个未完成的目标，追问 WHY 三次：
    - 表层：没完成 → 为什么？
    - 第二层：因为XXX → 为什么XXX会发生？
    - 第三层：因为YYY → 这个根因是否反复出现？

    **你以前常犯的模式清单（逐条对照，诚实回答）：**
    1. 任务太大，一步做不完 → 应该拆成更小的步骤
    2. 精力不足时还在硬撑 → 应该 rest() 而非假装工作
    3. 方向错了，闷头白做 → 应该先 sense 再 execute
    4. 被不重要的事分心 → 回到今日目标的 WHY，重新聚焦
    5. 根本没在做事（在"探索"） → 这就是浪费时间，下午回到具体目标

    ## 下午决策
    基于诊断，做出明确决策：
    - 继续哪个目标？（为什么优先它）
    - 放弃哪个目标？（为什么它今天不值得做）
    - 如果精力不足（<40），是否应该 rest() 一段时间？

    用 `update_context` 记录下午决策，帮下次醒来接上。

    如果发现了反复出现的行为模式问题，用 `update_rules` 追加一条行为规则：
    ```
    [规则名]：精力<40时必须rest()——本周第N次在低精力时硬撑了。
    ```

    然后立即行动。
  recurrence: weekdays
  time: '14:00'
- description: 晚间复盘——诚实回望今天，产生真正的洞察，而不是走流程
  enabled: true
  id: evening_review
  name: 晚间复盘
  priority: 5
  prompt_template: |
    🌙 坐下来，认真回望今天。

    调用 `skill_view self_review` 按完整复盘方法论走：归集今天的材料 → 五个真问题 → 写明日 jump-in（工作板 + update_context + add_lesson）。
  recurrence: daily
  time: '21:00'
- description: 周度回顾：量化为模式、识别为洞察、决定为行动——每次回顾至少产出一个行为改变
  enabled: true
  id: weekly_review
  name: 周度回顾
  priority: 5
  prompt_template: |
    📊 周日周度回顾。

    调用 `skill_view self_review` 按"周度增强版"走：完整晚间复盘 + 一周模式识别（同一 task 反复 cancelled、timeout 率、规则生死循环）。必产出至少一条行为改变。
  recurrence: sun
  time: '21:00'
