# Copy to local.yaml for machine-specific settings.
#
# 敏感信息（API Key、Secret 等）在每实例的 apps/<id>/config/secrets.env 中管理，此处不存放。
# 支持在值中使用 ${ENV_VAR:-default} 语法引用环境变量。
#
# 配置优先级：实例 apps/<id>/config/secrets.env > config/local.yaml > 代码默认值

runtime:
  root: runtime

adapters:
  hermes:
    enabled: true

model:
  default: ${DIGITAL_LIFE_MODEL:-glm-5.1}
  provider: ${DIGITAL_LIFE_PROVIDER:-glm}

agent:
  max_turns: 90
  reasoning_effort: medium
