# ============================================================
# 数字生命 系统级配置（全局，不区分实例）
# 实例级配置在 apps/<uuid>/config/app.yaml
# ============================================================

# ── API Server ──
api_server:
  port: 8642                               # HTTP 端口（默认 8642）

# ── 生命周期 ──
lifecycle:
  tick_interval: 60                         # cron tick 周期（秒）

# ── Token 预算（暂全局，后续可分实例）──
budget:
  daily_limit: 50000000                     # 每天每实例 token 上限
  hourly_limit: 50000000                    # 每小时（暂同 daily，不拦）

# ── 精力参数（全局行为模型）──
vitals:
  energy_recovery_per_hour: 100             # 休息时每小时恢复
  cost_per_ktoken_input: 0.005              # 每 1k input token 消耗精力
  cost_per_ktoken_output: 0.05              # 每 1k output token 消耗精力
  initiative_energy_threshold: 50           # 主动探索的精力阈值
  initiative_idle_hours: 1.0                # 主动探索的空闲阈值

# ── 事件 ──
events:
  packages_dir: event-packages
